name: Documentation Impact Detection

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  pull-requests: read

jobs:

  documentation-impact:

    uses: jijeeshlab/Actions/.github/workflows/documentation-impact.yml@main

    with:
      documentation_repo: jijeeshlab/doc-as-code
      documentation_dispatch_event: documentation_update_requested

    secrets:
      CENTRAL_DOCS_TOKEN: ${{ secrets.CENTRAL_DOCS_TOKEN }}
